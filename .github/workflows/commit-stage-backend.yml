name: commit-stage-backend

on:
  push:
    branches: [ "main" ]
    paths:
        - 'backend/**'
        - '.github/workflows/commit-stage-backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'backend/**'
        - '.github/workflows/commit-stage-backend.yml'
  workflow_dispatch:

concurrency:
  group: commit-stage-backend-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image-latest-url: ${{ steps.publish.outputs.image-latest-url }}
      image-digest-url: ${{ steps.publish.outputs.image-digest-url }}

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Runtime
      uses: ./.github/actions/setup-java
      with:
        java-version: 17
        working-directory: backend

    - name: Compile Code
      run: ./gradlew build
      working-directory: backend

    # - name: Run Unit Tests
    # - name: Run Narrow Integration Tests
    # - name: Run Component Tests
    # - name: Run Contract Tests
    # - name: Run Linter
    # - name: Run Code Analysis

    - name: Build and Push Artifact
      id: publish
      uses: optivem/publish-docker-image-action@v1
      with:
        working-directory: backend
        image-name: backend
        registry: ghcr.io
        registry-username: ${{ github.actor }}
        image-namespace: ${{ github.repository }}
        image-latest-tag: latest
        commit-sha: ${{ github.sha }}
        dockerfile: Dockerfile
      env:
        REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      
    - name: Commit Stage Summary
      uses: optivem/summarize-commit-stage-action@v1
      with:
        stage-result: ${{ needs.build.result }}
        success-artifact-url: ${{ needs.build.outputs.image-latest-url }}
